    <!-- left items -->
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#" role="button">
                <i class="fas fa-bars"></i>
            </a>
        </li>
        <li class="nav-item d-none d-sm-inline-block">
            <a href="index3.html" class="nav-link">Home</a>

        <li class="nav-item d-none d-sm-inline-block">
            <a href="#" class="nav-link">Contact</a>
        </li>
    </ul>

    <!-- right side: profile -->
    <ul class="navbar-nav ml-auto">
        <li class="nav-item">
            <button #profileBtn type="button" class="btn nav-link d-flex align-items-center profile-button"
                aria-haspopup="true" (click)="menu.toggle($event)">
                <span class="profile-icon-wrapper">
                    <i class="pi pi-user"></i>
                </span>
                <i class="pi pi-chevron-down ml-1"></i>
            </button>

            <!-- IMPORTANT: appendTo="body" fixes parent overflow/transform issues -->
            <p-menu #menu [popup]="true" appendTo="body" [model]="menuItems"
                [style]="{ 'margin-top': '6px', 'min-width': '180px' }" [autoZIndex]="true"></p-menu>
        </li>
    </ul>

<p-dialog header="User Profile" [(visible)]="userProfileDialog" [modal]="true" [style]="{ width: '400px' }"
    [showHeader]="true" styleClass="change-password-dialog" [closable]="true" [closeOnEscape]="true">
    <div class="password-form !pt-0">
        <div class="form-header !my-0">{{ currentUser?.userLoginInfo?.userName }}</div>
        <div class="flex gap-2 w-full mt-1" *ngIf="tenantName">
            <label for="role">Tenant:</label>
            <span>{{ tenantName }}</span>
        </div>
        <div class="flex gap-2 w-full mt-1">
            <label for="role">Role:</label>
            <span>{{ roleNames }}</span>
        </div>
        <div class="flex gap-2 w-full mt-1">
            <label for="role">Department:</label>
            <span>{{ currentUser?.departmentName ?? 'Administrator' }}</span>
        </div>
        <div class="flex gap-2 w-full mt-1">
            <label for="role">Email:</label>
            <span>{{ currentUser?.userLoginInfo?.userEmail }}</span>
        </div>
        <div class="dialog-footer">
            <button pButton label="Close" severity="secondary" (click)="userProfileDialog = false"></button>
            <button pButton type="button" label="Update Profile" class="primary-button" (click)="updateProfile()"
                *ngIf="isTenantAdmin"></button>
        </div>
    </div>
</p-dialog>
