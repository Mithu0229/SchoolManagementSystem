<article class="panel">
    <header class="panel-header">
        <h3>Disciplinary</h3>
    </header>

    <div class="panel-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Note</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of rows">
                    <td>{{ row.date }}</td>
                    <td>{{ row.category }}</td>
                    <td>{{ row.status }}</td>
                    <td>{{ row.note }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</article>
