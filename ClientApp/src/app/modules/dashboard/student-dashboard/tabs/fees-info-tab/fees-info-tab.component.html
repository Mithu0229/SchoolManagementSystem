<article class="panel">
    <header class="panel-header">
        <h3>Fees Info</h3>
    </header>

    <div class="panel-body">
        <div class="summary-grid">
            <div class="summary-card" *ngFor="let item of summary">
                <p>{{ item.title }}</p>
                <h4>{{ item.amount }}</h4>
            </div>
        </div>

        <table class="table">
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of history">
                    <td>{{ row.month }}</td>
                    <td>{{ row.amount }}</td>
                    <td>{{ row.status }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</article>
