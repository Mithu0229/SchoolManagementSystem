<article class="panel">
    <header class="panel-header">
        <h3>Admit Card</h3>
    </header>

    <div class="panel-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Exam</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of rows">
                    <td>{{ row.exam }}</td>
                    <td>{{ row.date }}</td>
                    <td>{{ row.status }}</td>
                    <td><button class="action-btn" type="button">Download</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</article>
