<article class="panel">
    <header class="panel-header">
        <h3>Attendance Summary</h3>
    </header>

    <div class="panel-body">
        <table class="table">
            <thead>
                <tr>
                    <th>Month</th>
                    <th>Present</th>
                    <th>Absent</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of monthly">
                    <td>{{ row.month }}</td>
                    <td>{{ row.present }}</td>
                    <td>{{ row.absent }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</article>
